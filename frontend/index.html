<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMyNotes AI</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 to-sky-50 min-h-screen flex items-center justify-center p-6">

    <!-- Main Container -->
    <div class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-2xl border border-slate-200">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-3">
                AskMyNotes AI
            </h1>

            <p class="text-slate-600 text-lg">
                Upload your notes and ask questions from them.
            </p>
        </div>

        <hr class="mb-8">

        <!-- Upload Section -->
        <div class="mb-8">

            <h2 class="text-2xl font-bold text-slate-800 mb-4">
                Upload Notes
            </h2>

            <label class="block text-slate-700 font-medium mb-3">
                Choose your notes file:
            </label>

            <input 
                type="file"
                class="w-full p-4 border-2 border-dashed border-blue-300 rounded-xl bg-blue-50
                file:bg-blue-600 file:text-white
                file:border-none file:px-5 file:py-2
                file:rounded-lg file:cursor-pointer
                hover:file:bg-blue-700
                cursor-pointer transition"
            >

        </div>

        <hr class="mb-8">

        <!-- Question Section -->
        <div class="mb-8">

            <h2 class="text-2xl font-bold text-slate-800 mb-4">
                Ask a Question
            </h2>

            <label class="block text-slate-700 font-medium mb-3">
                Enter your question:
            </label>

            <textarea
                rows="5"
                placeholder="Ask anything from your notes..."
                class="w-full border border-slate-300 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-slate-700"
            ></textarea>

            <button
                class="mt-5 bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold
                hover:bg-blue-700 hover:scale-105 active:scale-95
                transition duration-300 shadow-lg"
            >
                Ask My Notes
            </button>

        </div>

        <hr class="mb-8">

        <!-- Answer Section -->
        <div>

            <h2 class="text-2xl font-bold text-slate-800 mb-4">
                Answer
            </h2>

            <div 
                id="answerBox"
                class="bg-slate-100 border border-slate-200 rounded-xl p-5 text-slate-700 min-h-[120px]"
            >
                Your AI-generated answer will appear here.
            </div>

        </div>

        <hr class="my-8">

        <!-- Footer -->
        <footer class="text-center text-slate-500 text-sm">
            AskMyNotes AI Capstone Project
        </footer>

    </div>

    <!-- JavaScript -->
    <script>

        const fileInput = document.querySelector('input[type="file"]');
        const textarea = document.querySelector('textarea');
        const button = document.querySelector('button');
        const answerBox = document.getElementById('answerBox');

        button.addEventListener("click", () => {

            // File validation
            if(fileInput.files.length === 0){
                alert("Please upload your notes file.");
                return;
            }

            // Question validation
            if(textarea.value.trim() === ""){
                alert("Please enter your question.");
                return;
            }

            // Loading state
            answerBox.innerHTML = `
                <p class="text-blue-600 font-semibold animate-pulse">
                    Generating AI answer...
                </p>
            `;

            // Fake AI response
            setTimeout(() => {

                answerBox.innerHTML = `
                    <div class="space-y-3">

                        <p>
                            <span class="font-bold text-blue-600">
                                Question:
                            </span>
                            ${textarea.value}
                        </p>

                        <p>
                            <span class="font-bold text-green-600">
                                AI Response:
                            </span>
                            Based on your uploaded notes, this is a generated answer related to your question.
                        </p>

                    </div>
                `;

            }, 2000);

        });

    </script>

</body>
</html>
