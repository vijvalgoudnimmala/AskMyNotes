<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>AskMyNotes AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 to-sky-50 min-h-screen flex items-center justify-center p-6">
    <div id="mainContainer"
    class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-2xl border border-slate-200">
        <div id="headerSection"
        class="text-center mb-8">
            <h1 id="mainTitle"
            class="text-4xl font-extrabold text-blue-600 mb-3">
                AskMyNotes AI
            </h1>
            <p id="subtitle"
            class="text-slate-600 text-lg">
                Upload your notes and ask questions from them.
            </p>
        </div>
        <hr class="mb-8">
        <div id="uploadSection"
        class="mb-8">
            <h2 id="uploadHeading"
            class="text-2xl font-bold text-slate-800 mb-4">
                Upload Notes
            </h2>
            <label id="uploadLabel"
            class="block text-slate-700 font-medium mb-3">
                Choose your notes file:
            </label>
            <input
                id="fileInput"
                type="file"
                class="w-full p-4 border-2 border-dashed border-blue-300 rounded-xl bg-blue-50 file:bg-blue-600 file:text-white file:border-none file:px-5 file:py-2 file:rounded-lg file:cursor-pointer hover:file:bg-blue-700 cursor-pointer transition"
            >
            <p id="uploadStatus"
            class="mt-3 text-sm font-medium text-slate-600">
                No file uploaded
            </p>
        </div>
        <hr class="mb-8">
        <div id="questionSection"
        class="mb-8">
            <h2 id="questionHeading"
            class="text-2xl font-bold text-slate-800 mb-4">
                Ask a Question
            </h2>
            <label id="questionLabel"
            class="block text-slate-700 font-medium mb-3">
                Enter your question:
            </label>
            <textarea
                id="questionInput"
                rows="5"
                placeholder="Ask anything from your notes..."
                class="w-full border border-slate-300 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-slate-700"
            ></textarea>
            <button
                id="askButton"
                class="mt-5 bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-700 hover:scale-105 active:scale-95 transition duration-300 shadow-lg"
            >
                Ask My Notes
            </button>
        </div>
        <hr class="mb-8">
        <div id="answerSection">
            <h2 class="text-2xl font-bold text-slate-800 mb-4">
                Answer
            </h2>
            <p id="statusEl"
            class="min-h-[1.25rem]"></p>
            <div id="answerEl"
            class="hidden bg-slate-100 border border-slate-200 rounded-xl p-5">
                <div class="flex gap-3 mb-4">
                    <span id="qtypePill"
                    class="hidden px-3 py-1 rounded-full text-sm font-medium">
                    </span>
                    <span id="toolPill"
                    class="hidden px-3 py-1 rounded-full text-sm font-medium">
                    </span>
                </div>
                <p id="answerTextEl"
                class="text-slate-700 mb-5">
                </p>
                <div id="sourcesEl"
                class="hidden">
                    <h3 class="font-bold text-slate-800 mb-3">
                        Sources
                    </h3>
                    <ul id="sourcesListEl"
                    class="space-y-2 list-disc pl-5 text-slate-600">
                    </ul>
                </div>
            </div>
        </div>
        <hr class="my-8">
        <footer id="footer"
        class="text-center text-slate-500 text-sm">
            AskMyNotes AI Capstone Project
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
